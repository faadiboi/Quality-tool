<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHANTOM QUALITY TOOL | Liquid Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #020406;
            --liquid-glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --neon-blue: #00f2ff;
            --neon-green: #00ffaa;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(0, 242, 255, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(0, 255, 170, 0.08) 0%, transparent 45%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .liquid-card {
            background: var(--liquid-glass);
            backdrop-filter: blur(40px) saturate(200%) brightness(120%);
            -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(120%);
            border: 1px solid var(--glass-border);
            border-radius: 60px; 
            padding: 50px 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        h2 {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 30px; }

        .pill-btn {
            width: 100%;
            padding: 18px;
            border-radius: 100px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            font-family: 'Exo 2', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .pill-btn:hover { transform: scale(1.03); background: #fff; }

        .file-box {
            background: rgba(0, 110, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
        }

        input[type="file"] { color: var(--text-dim); font-size: 0.75rem; width: 100%; }

        .credits-footer {
            margin-top: 40px;
            border-top: 1px solid var(--glass-border);
            padding-top: 25px;
        }

        .made-with {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .social-item i { font-size: 24px; }
        .fa-tiktok { color: #ffffff; }
        .fa-instagram { color: #E4405F; }

        .social-username {
            font-family: 'Exo 2', sans-serif;
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 600;
        }

        .social-item:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.05); }
        .social-item:hover .social-username { color: var(--neon-blue); }

        #status { margin-top: 15px; font-size: 0.7rem; font-weight: 600; }
        .success { color: var(--neon-green); }
        .error { color: #ff3b30; }

        #app-content { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="liquid-card">
            <h2>SECURITY CHECK</h2>
            <p id="auth-msg">PHANTOM QUALITY TOOL</p>
            <button class="pill-btn" onclick="checkAccess()">ACTIVATE LICENSE</button>
            
            <div class="credits-footer">
                <div class="made-with">Made with ❤️ By.</div>
                <div class="social-container">
                    <a href="https://www.tiktok.com/@faadiboii?_r=1&_t=ZN-95nhnYU5Xgk" target="_blank" class="social-item">
                        <i class="fab fa-tiktok"></i>
                        <span class="social-username">@faadiboii</span>
                    </a>
                    <a href="https://www.instagram.com/faadiboii?igsh=MWcxOXloN2xnYjRnMw==" target="_blank" class="social-item">
                        <i class="fab fa-instagram"></i>
                        <span class="social-username">@faadiboii</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content">
        <div class="liquid-card">
            <h2>PHANTOM QUALITY TOOL</h2>
            <p>BINARY METADATA OPTIMIZER</p>
            <div class="file-box"><input type="file" id="fileInput" accept="video/mp4"></div>
            <button id="patchBtn" class="pill-btn" onclick="patchVideo()">PATCH & DOWNLOAD</button>
            <div id="status"></div>

            <div class="credits-footer">
                <div class="made-with">Made with ❤️ By.</div>
                <div class="social-container">
                    <a href="https://www.tiktok.com/@faadiboii" target="_blank" class="social-item">
                        <i class="fab fa-tiktok"></i>
                        <span class="social-username">@faadiboii</span>
                    </a>
                    <a href="https://www.instagram.com/faadiboii" target="_blank" class="social-item">
                        <i class="fab fa-instagram"></i>
                        <span class="social-username">@faadiboii</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrTSY-gzGmHcVl0G4pkW2LxWNQBgUQmNn9ww18ApL_C0xjUgqLMi5RpcD40eUBKEmVZA/exec";

    async function checkAccess() {
        const userKey = prompt("Enter License Key:");
        if (!userKey) return;
        
        // Show verification text
        const authMsg = document.getElementById('auth-msg');
        authMsg.innerText = "Verifying Identity and Device...";
        authMsg.style.color = "#00f2ff";

        const fingerprint = navigator.userAgent + window.screen.width + window.screen.height + navigator.language;
        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?key=${encodeURIComponent(userKey)}&info=${encodeURIComponent(fingerprint)}`);
            const result = await response.json();
            if (result.authorized) {
                document.getElementById('auth-screen').style.display = "none";
                document.getElementById('app-content').style.display = "block";
                localStorage.setItem('phantom_key', userKey);
            } else { 
                alert(result.message || "Invalid Key!"); 
                authMsg.innerText = "PHANTOM QUALITY TOOL";
                authMsg.style.color = "rgba(255, 255, 255, 0.6)";
            }
        } catch (err) { 
            alert("Connection Error."); 
            authMsg.innerText = "PHANTOM QUALITY TOOL";
        }
    }

    async function patchVideo() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) { showStatus("Select file", "error"); return; }
        const file = fileInput.files[0];
        showStatus("Optimizing...", "success");
        try {
            const arrayBuffer = await file.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const view = new DataView(arrayBuffer);
            const atoms = ["mvhd", "mdhd"];
            atoms.forEach(atom => {
                const atomBytes = new TextEncoder().encode(atom);
                for (let i = 0; i < data.length - 4; i++) {
                    if (data[i] === atomBytes[0] && data[i+1] === atomBytes[1] && data[i+2] === atomBytes[2] && data[i+3] === atomBytes[3]) {
                        const hdr = i - 4;
                        const version = data[hdr + 8];
                        const tsOff = (version === 0) ? hdr + 20 : hdr + 28;
                        if (tsOff + 4 <= data.length) {
                            const oldTs = view.getUint32(tsOff, false);
                            view.setUint32(tsOff, Math.floor(oldTs * (30.0/60.0)), false);
                        }
                    }
                }
            });
            const blob = new Blob([view], { type: "video/mp4" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name.replace(".mp4", "_patched.mp4");
            a.click();
            showStatus("Done!", "success");
        } catch (e) { showStatus("Error", "error"); }
    }
    function showStatus(text, className) {
        const s = document.getElementById('status');
        s.innerText = text; s.className = className;
    }
</script>
</body>
</html>
